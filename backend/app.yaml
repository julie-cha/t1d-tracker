runtime: nodejs20

# App Engine Standard Environment
env: standard

instance_class: F1

automatic_scaling:
  min_instances: 0
  max_instances: 2

handlers:
  - url: /.*
    script: auto
    secure: always

env_variables:
  NODE_ENV: "production"

# Cloud SQL connection
beta_settings:
  cloud_sql_instances: "PROJECT_ID:REGION:INSTANCE_NAME"